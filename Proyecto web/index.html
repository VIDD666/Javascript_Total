<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gestor de Proyectos - Gestiones Antonella</title>
    <style>
        body {
            font-family: 'Inter', Arial, sans-serif;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            margin: 0;
            padding: 20px;
            color: #222;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            padding: 24px;
        }
        h1 {
            text-align: center;
            margin-bottom: 32px;
            font-weight: 800;
            color: #0d3b66;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        input, button {
            padding: 12px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline-offset: 2px;
            outline-color: transparent;
            transition: outline-color 0.2s ease;
        }
        input:focus, button:focus {
            outline-color: #0d3b66;
        }
        button {
            background: #0d3b66;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background: #134074;
        }
        ul {
            list-style: none;
            margin: 24px 0 0 0;
            padding: 0;
        }
        li {
            background: #f0f4f8;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 12px;
            font-weight: 600;
            color: #0d3b66;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        li span {
            flex: 1;
            margin-right: 16px;
        }
        button.delete-btn {
            background: #d90429;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        button.delete-btn:hover {
            background: #9b0214;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gestor de Proyectos - Gestiones Antonella</h1>
        <form id="projectForm" aria-label="Formulario para agregar proyecto">
            <input type="text" id="nombre" placeholder="Nombre del Proyecto" required aria-required="true" />
            <input type="text" id="responsable" placeholder="Responsable" required aria-required="true" />
            <input type="text" id="estado" placeholder="Estado (Ej: Pendiente, En curso)" required aria-required="true" />
            <input type="number" id="avance" min="0" max="100" placeholder="Avance (%)" required aria-required="true" />
            <button type="submit">Agregar Proyecto</button>
        </form>
        <ul id="projectList" aria-live="polite" aria-label="Lista de proyectos"></ul>
    </div>

<script>
    const projectForm = document.getElementById('projectForm');
    const projectList = document.getElementById('projectList');
    async function fetchProjects() {
        try {
            const res = await fetch('http://localhost:3000/proyectos');
            const projects = await res.json();
            projectList.innerHTML = '';
            if (projects.length === 0) {
                projectList.innerHTML = '<li>No hay proyectos registrados.</li>';
                return;
            }
            projects.forEach(project => {
                const li = document.createElement('li');
                const span = document.createElement('span');
                span.textContent = `${project.nombre} - Responsable: ${project.responsable} - Estado: ${project.estado} - Avance: ${project.avance}%`;

                const deleteBtn = document.createElement('button');
                deleteBtn.textContent = 'Eliminar';
                deleteBtn.className = 'delete-btn';
                deleteBtn.setAttribute('aria-label', `Eliminar proyecto ${project.nombre}`);
                deleteBtn.addEventListener('click', () => deleteProject(project.id));

                li.appendChild(span);
                li.appendChild(deleteBtn);
                projectList.appendChild(li);
            });
        } catch (error) {
            projectList.innerHTML = `<li>Error cargando proyectos: ${error.message}</li>`;
        }
    }
    async function deleteProject(id) {
        try {
            await fetch(`http://localhost:3000/proyectos/${id}`, { method: 'DELETE' });
            fetchProjects();
        } catch (error) {
            alert('Error eliminando proyecto');
        }
    }

    projectForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const nombre = document.getElementById('nombre').value.trim();
        const responsable = document.getElementById('responsable').value.trim();
        const estado = document.getElementById('estado').value.trim();
        const avance = Number(document.getElementById('avance').value);

        if (!nombre || !responsable || !estado || isNaN(avance) || avance < 0 || avance > 100) {
            alert('Por favor llena todos los campos correctamente.');
            return;
        }

        try {
            await fetch('http://localhost:3000/proyectos', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ nombre, responsable, estado, avance })
            });
            projectForm.reset();
            fetchProjects();
        } catch (error) {
            alert('Error agregando proyecto.');
        }
    });
    fetchProjects();
</script>
</body>
</html>
